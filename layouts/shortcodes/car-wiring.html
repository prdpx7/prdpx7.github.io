<figure class="hw-anim hw-schematic">
  <svg viewBox="0 0 720 470" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="4WD wiring schematic — ESP32 drives TB6612FNG, which drives two anti-parallel motor pairs">
    <defs>
      <filter id="car-wiring-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dy="3" result="o"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <text x="360" y="24" text-anchor="middle" fill="#3a2510" font-size="13"
          font-family="ui-serif, Georgia, serif" font-style="italic">
      channel A drives the left wheels · channel B drives the right wheels
    </text>

    <!-- Wires (drawn behind blocks so endpoints land under the chip edges) -->
    <g fill="none" stroke-width="2.5" stroke-linecap="round">
      <!-- ESP32 GPIOs → TB6612 input pins -->
      <path d="M170 130 L 280 130" stroke="#2e74c0"/>
      <path d="M170 160 L 280 160" stroke="#27ae60"/>
      <path d="M170 190 L 280 190" stroke="#8e44ad"/>
      <path d="M170 240 L 280 240" stroke="#2e74c0"/>
      <path d="M170 270 L 280 270" stroke="#27ae60"/>
      <path d="M170 300 L 280 300" stroke="#8e44ad"/>
      <path d="M170 335 L 280 335" stroke="#7a6c4a"/>

      <!-- TB6612 outputs → motor pairs -->
      <path d="M460 130 C 510 130, 530 160, 574 160" stroke="#c89a1e"/>
      <path d="M460 160 C 510 160, 530 188, 574 188" stroke="#7f8c8d"/>
      <path d="M460 240 C 510 240, 530 310, 574 310" stroke="#c89a1e"/>
      <path d="M460 270 C 510 270, 530 338, 574 338" stroke="#7f8c8d"/>

      <!-- Battery pack → VM / GND -->
      <path d="M305 425 L 305 398 L 345 398 L 345 378" stroke="#c0392b"/>
      <path d="M445 425 L 445 398 L 395 398 L 395 378" stroke="#7a6c4a"/>
    </g>

    <!-- ESP32 -->
    <g filter="url(#car-wiring-shadow)">
      <rect x="40" y="70" width="130" height="290" rx="10" fill="#1b5a3a" stroke="#0d4027" stroke-width="1.5"/>
      <text x="105" y="92" text-anchor="middle" fill="#d9ecff" font-size="13" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">ESP32</text>
      <text x="105" y="107" text-anchor="middle" fill="#a8c8e0" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">dev board</text>
    </g>
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11">
      <text x="160" y="134" text-anchor="end" fill="#2e74c0">GPIO 27</text>
      <text x="160" y="164" text-anchor="end" fill="#27ae60">GPIO 26</text>
      <text x="160" y="194" text-anchor="end" fill="#8e44ad">GPIO 14</text>
      <text x="160" y="244" text-anchor="end" fill="#2e74c0">GPIO 25</text>
      <text x="160" y="274" text-anchor="end" fill="#27ae60">GPIO 33</text>
      <text x="160" y="304" text-anchor="end" fill="#8e44ad">GPIO 12</text>
      <text x="160" y="339" text-anchor="end" fill="#7a6c4a">GND</text>
    </g>

    <!-- Channel A / B bracket hints on ESP32 side -->
    <g font-family="ui-serif, Georgia, serif" font-size="10" font-style="italic" fill="#8a7a55">
      <text x="30" y="165" text-anchor="start">channel A</text>
      <text x="30" y="275" text-anchor="start">channel B</text>
    </g>

    <!-- TB6612FNG -->
    <g filter="url(#car-wiring-shadow)">
      <rect x="280" y="70" width="180" height="310" rx="8" fill="#1a1a1f" stroke="#000" stroke-width="1.5"/>
      <text x="370" y="92" text-anchor="middle" fill="#f4ede0" font-size="13" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">TB6612FNG</text>
      <text x="370" y="107" text-anchor="middle" fill="#c8c8d0" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">dual H-bridge driver</text>
    </g>
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11">
      <text x="290" y="134" fill="#2e74c0">AIN1</text>
      <text x="290" y="164" fill="#27ae60">AIN2</text>
      <text x="290" y="194" fill="#8e44ad">PWMA</text>
      <text x="290" y="244" fill="#2e74c0">BIN1</text>
      <text x="290" y="274" fill="#27ae60">BIN2</text>
      <text x="290" y="304" fill="#8e44ad">PWMB</text>
      <text x="290" y="339" fill="#b0b0b8">GND</text>
      <text x="450" y="134" text-anchor="end" fill="#c89a1e">AO1</text>
      <text x="450" y="164" text-anchor="end" fill="#c5c5c5">AO2</text>
      <text x="450" y="244" text-anchor="end" fill="#c89a1e">BO1</text>
      <text x="450" y="274" text-anchor="end" fill="#c5c5c5">BO2</text>
      <text x="345" y="370" text-anchor="middle" fill="#e57a68">VM</text>
      <text x="395" y="370" text-anchor="middle" fill="#b0b0b8">GND</text>
    </g>

    <!-- Left-side motor pair -->
    <g filter="url(#car-wiring-shadow)">
      <rect x="560" y="95" width="150" height="110" rx="8" fill="#2a2a2e" stroke="#12121a" stroke-width="1.5"/>
      <text x="635" y="118" text-anchor="middle" fill="#f4ede0" font-size="13" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">Left wheels</text>
      <text x="635" y="133" text-anchor="middle" fill="#b8b8a0" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">L1 + L2 · anti-parallel</text>
      <rect x="574" y="150" width="122" height="20" rx="3" fill="#1a1a10" stroke="#33331a"/>
      <text x="584" y="164" fill="#f1c40f" font-size="11" font-weight="600"
            font-family="ui-monospace, Menlo, Consolas, monospace">Wire A</text>
      <text x="694" y="164" text-anchor="end" fill="#888" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">from AO1</text>
      <rect x="574" y="178" width="122" height="20" rx="3" fill="#1a1a1f" stroke="#2a2a3a"/>
      <text x="584" y="192" fill="#c5c5c5" font-size="11" font-weight="600"
            font-family="ui-monospace, Menlo, Consolas, monospace">Wire B</text>
      <text x="694" y="192" text-anchor="end" fill="#888" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">from AO2</text>
    </g>

    <!-- Right-side motor pair -->
    <g filter="url(#car-wiring-shadow)">
      <rect x="560" y="245" width="150" height="110" rx="8" fill="#2a2a2e" stroke="#12121a" stroke-width="1.5"/>
      <text x="635" y="268" text-anchor="middle" fill="#f4ede0" font-size="13" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">Right wheels</text>
      <text x="635" y="283" text-anchor="middle" fill="#b8b8a0" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">R1 + R2 · anti-parallel</text>
      <rect x="574" y="300" width="122" height="20" rx="3" fill="#1a1a10" stroke="#33331a"/>
      <text x="584" y="314" fill="#f1c40f" font-size="11" font-weight="600"
            font-family="ui-monospace, Menlo, Consolas, monospace">Wire C</text>
      <text x="694" y="314" text-anchor="end" fill="#888" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">from BO1</text>
      <rect x="574" y="328" width="122" height="20" rx="3" fill="#1a1a1f" stroke="#2a2a3a"/>
      <text x="584" y="342" fill="#c5c5c5" font-size="11" font-weight="600"
            font-family="ui-monospace, Menlo, Consolas, monospace">Wire D</text>
      <text x="694" y="342" text-anchor="end" fill="#888" font-size="9"
            font-family="ui-monospace, Menlo, Consolas, monospace">from BO2</text>
    </g>

    <!-- Battery pack -->
    <g filter="url(#car-wiring-shadow)">
      <rect x="275" y="410" width="180" height="40" rx="6" fill="#b38b4a" stroke="#8a5a20" stroke-width="1.5"/>
      <text x="365" y="430" text-anchor="middle" fill="#3a2510" font-size="12" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">2× 18650 · 7.4 V</text>
      <text x="284" y="447" fill="#c0392b" font-size="10" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">+</text>
      <text x="446" y="447" text-anchor="end" fill="#7a6c4a" font-size="10" font-weight="700"
            font-family="ui-monospace, Menlo, Consolas, monospace">−</text>
    </g>
  </svg>
  <figcaption>the wiring in one frame — same H-bridge twice, one channel per wheel pair</figcaption>
</figure>
