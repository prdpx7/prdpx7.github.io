{{ define "main" }}
<header class="home-header">
  <h1>Pradeep Khileri</h1>
  <p>Software engineer. I build things and write about it sometimes.</p>
</header>

<hr>

<section>
  <h2>Find me</h2>
  <ul>
    <li><a href="https://github.com/prdpx7" target="_blank" rel="noopener noreferrer">GitHub</a></li>
    <li><a href="https://linkedin.com/in/pradeepkhileri" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
    <li><a href="https://twitter.com/prdpx7" target="_blank" rel="noopener noreferrer">Twitter</a></li>
  </ul>
</section>

<hr>

<section>
  <h2>Writing</h2>
  <ul class="post-list">
    {{ range (where .Site.RegularPages "Section" "posts") }}
    <li>
      <span class="date">{{ .Date.Format "2006-01-02" }}</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
